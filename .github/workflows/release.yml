name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  compute-version:
    name: Compute next version
    if: github.event.forced == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      next_version: ${{ steps.compute.outputs.next_version }}
      skip_release: ${{ steps.compute.outputs.skip_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

          echo "Latest tag: $LATEST_TAG"

          # Find the PR that was merged via this push (retry for API propagation delay)
          PR_NUMBER=""
          for attempt in 1 2 3; do
            PR_NUMBER=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls" --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "PR not yet indexed, retrying in 10s (attempt $attempt/3)..."
              sleep 10
            fi
          done

          # Fallback: parse PR number from squash-merge commit message "(#N)"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            COMMIT_MSG=$(git log -1 --format='%s' "$GITHUB_SHA")
            PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE '\(#[0-9]+\)$' | grep -oE '[0-9]+' || echo "")
            if [ -n "$PR_NUMBER" ]; then
              echo "Extracted PR number from commit message: #$PR_NUMBER"
            fi
          fi

          echo "PR number: $PR_NUMBER"

          # Skip if no PR is associated (e.g. a direct push to main)
          if [ "$PR_NUMBER" = "null" ] || [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this push, skipping release"
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch all commit subjects from the PR (paginated)
          COMMITS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" \
            --paginate --jq '.[].commit.message | split("\n")[0]')

          echo "Commits in PR:"
          echo "$COMMITS"

          bump_level() {
            MSG="$1"
            if   echo "$MSG" | grep -qE '^[a-z]+(\([^)]+\))?!:';                         then echo 3
            elif echo "$MSG" | grep -qE '^feat(\([^)]+\))?:';                             then echo 2
            elif echo "$MSG" | grep -qE '^(fix|perf|refactor|revert|test)(\([^)]+\))?:'; then echo 1
            else echo 0
            fi
          }

          # no-bump escape hatch: if any commit starts with "no-bump:", skip release
          if echo "$COMMITS" | grep -qE '^no-bump(\([^)]+\))?:'; then
            BUMP="none"
          else
            MAX_LEVEL=0
            while IFS= read -r TITLE; do
              LEVEL=$(bump_level "$TITLE")
              [ "$LEVEL" -gt "$MAX_LEVEL" ] && MAX_LEVEL=$LEVEL
            done <<< "$COMMITS"

            case "$MAX_LEVEL" in
              3) BUMP="major" ;;
              2) BUMP="minor" ;;
              1) BUMP="patch" ;;
              0) BUMP="none"  ;;
            esac
          fi

          echo "Bump type: $BUMP"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            none)  ;;
          esac

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$BUMP" = "none" ]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release: version stays at $LATEST_TAG"
          else
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    name: Create release
    needs: compute-version
    if: needs.compute-version.outputs.skip_release == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NEXT_VERSION: ${{ needs.compute-version.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Tag and push
        run: |
          git tag -a "$NEXT_VERSION" -m "Release $NEXT_VERSION"
          git push origin "$NEXT_VERSION"

      - name: Create GitHub Release
        run: gh release create "$NEXT_VERSION" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-amo:
    name: Publish to AMO
    needs: [compute-version, create-release]
    runs-on: ubuntu-latest
    env:
      NEXT_VERSION: ${{ needs.compute-version.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.compute-version.outputs.next_version }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Stamp version into manifest.json
        run: |
          VERSION="${NEXT_VERSION#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src/manifest.json

      - name: Sign and submit to AMO
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir src \
            --channel listed \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET"
