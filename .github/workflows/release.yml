name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions: read-all

jobs:
  compute-version:
    name: Compute next version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      next_version: ${{ steps.compute.outputs.next_version }}
      skip_release: ${{ steps.compute.outputs.skip_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eu

          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

          echo "Latest tag: $LATEST_TAG"

          # Fetch all commit subjects from the PR (paginated)
          COMMITS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" \
            --paginate --jq '.[].commit.message | split("\n")[0]')

          echo "Commits in PR:"
          echo "$COMMITS"

          bump_level() {
            MSG="$1"
            if   echo "$MSG" | grep -qE '^[a-z]+(\([^)]+\))?!:';                         then echo 3
            elif echo "$MSG" | grep -qE '^feat(\([^)]+\))?:';                             then echo 2
            elif echo "$MSG" | grep -qE '^(fix|perf|refactor|revert|test)(\([^)]+\))?:'; then echo 1
            else echo 0
            fi
          }

          # no-bump escape hatch: if any commit starts with "no-bump:", skip release
          if echo "$COMMITS" | grep -qE '^no-bump(\([^)]+\))?:'; then
            BUMP="none"
          else
            MAX_LEVEL=0
            while IFS= read -r TITLE; do
              LEVEL=$(bump_level "$TITLE")
              [ "$LEVEL" -gt "$MAX_LEVEL" ] && MAX_LEVEL=$LEVEL
            done <<< "$COMMITS"

            case "$MAX_LEVEL" in
              3) BUMP="major" ;;
              2) BUMP="minor" ;;
              1) BUMP="patch" ;;
              0) BUMP="none"  ;;
            esac
          fi

          echo "Bump type: $BUMP"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            none)  ;;
          esac

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$BUMP" = "none" ]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release: version stays at $LATEST_TAG"
          else
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    name: Bump version and create release
    needs: compute-version
    if: needs.compute-version.outputs.skip_release == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NEXT_VERSION: ${{ needs.compute-version.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Bump version
        run: |
          # Strip leading 'v' — npm version expects bare semver (e.g. 0.2.0)
          VERSION="${NEXT_VERSION#v}"
          npm version "$VERSION"

      - name: Push version bump commit and tag
        # Requires "Allow GitHub Actions to create or approve pull requests" and
        # "Allow GitHub Actions to bypass required reviews" in repo Settings →
        # Actions → General, or use a PAT with repo write access instead of
        # GITHUB_TOKEN if main branch protection blocks direct pushes.
        run: |
          git push origin main
          git push origin "$NEXT_VERSION"

      - name: Create GitHub Release
        run: gh release create "$NEXT_VERSION" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-amo:
    name: Publish to AMO
    needs: [compute-version, create-release]
    runs-on: ubuntu-latest
    env:
      NEXT_VERSION: ${{ needs.compute-version.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.compute-version.outputs.next_version }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sign and submit to AMO
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir src \
            --channel listed \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET"
