name: Release preview

on:
  # pull_request_target runs in the base-repo context even for fork PRs,
  # giving the token write access to post comments. We never execute code
  # from the PR head, so this is safe.
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions: read-all

jobs:
  release-preview:
    name: Release preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Compute and post release preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eu

          # Get latest semver tag via API — no checkout needed
          LATEST_TAG=$(gh api "repos/$GITHUB_REPOSITORY/tags" --paginate \
            --jq '.[].name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

          # Fetch all commit subjects from the PR (paginated)
          COMMITS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" \
            --paginate --jq '.[].commit.message | split("\n")[0]')

          bump_level() {
            MSG="$1"
            if   echo "$MSG" | grep -qE '^[a-z]+(\([^)]+\))?!:';                         then echo 3
            elif echo "$MSG" | grep -qE '^feat(\([^)]+\))?:';                             then echo 2
            elif echo "$MSG" | grep -qE '^(fix|perf|refactor|revert|test)(\([^)]+\))?:'; then echo 1
            else echo 0
            fi
          }

          # no-bump escape hatch: if any commit starts with "no-bump:", skip release
          if echo "$COMMITS" | grep -qE '^no-bump(\([^)]+\))?:'; then
            BUMP="none"
          else
            MAX_LEVEL=0
            while IFS= read -r TITLE; do
              LEVEL=$(bump_level "$TITLE")
              [ "$LEVEL" -gt "$MAX_LEVEL" ] && MAX_LEVEL=$LEVEL
            done <<< "$COMMITS"

            case "$MAX_LEVEL" in
              3) BUMP="major" ;;
              2) BUMP="minor" ;;
              1) BUMP="patch" ;;
              0) BUMP="none"  ;;
            esac
          fi

          case "$BUMP" in
            major) NEXT_MAJOR=$((MAJOR + 1)); NEXT_VERSION="v${NEXT_MAJOR}.0.0" ;;
            minor) NEXT_MINOR=$((MINOR + 1)); NEXT_VERSION="v${MAJOR}.${NEXT_MINOR}.0" ;;
            patch) NEXT_PATCH=$((PATCH + 1)); NEXT_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}" ;;
            none)  NEXT_VERSION="$LATEST_TAG" ;;
          esac

          # Sanitize a commit title for safe inclusion in markdown
          sanitize() {
            # Replace backticks (would break inline code) and pipes (would break table cells)
            echo "$1" | sed 's/`/'"'"'/g; s/|/\\|/g'
          }

          # Build changelog: all releasable conventional commits
          CHANGELOG=""
          while IFS= read -r TITLE; do
            if echo "$TITLE" | grep -qE '^(feat|fix|perf|refactor|revert|test)(\([^)]+\))?(!)?:|^[a-z]+(\([^)]+\))?!:'; then
              SAFE_TITLE=$(sanitize "$TITLE")
              CHANGELOG="${CHANGELOG}- \`${SAFE_TITLE}\`\n"
            fi
          done <<< "$COMMITS"

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # Build comment body matching shipkit's format
          case "$BUMP" in
            major)
              HEADER="### 🚨 MAJOR VERSION BUMP"
              BUMP_ROW="| **Bump type** | **MAJOR** — breaking change |"
              WARNING="\n\n> ⚠️ This release increments the major version. Ensure breaking changes are intentional and documented."
              ;;
            none)
              HEADER="### ⏭️ No Release"
              BUMP_ROW="| **Bump type** | none |"
              WARNING=""
              ;;
            *)
              HEADER="### 📦 Release Preview"
              BUMP_ROW="| **Bump type** | ${BUMP} |"
              WARNING=""
              ;;
          esac

          CHANGELOG_SECTION=""
          if [ -n "$CHANGELOG" ]; then
            CHANGELOG_SECTION="\n\n**Changelog preview:**\n$(printf '%b' "$CHANGELOG")"
          fi

          BODY="$(printf '<!-- release-preview -->\n%s\n\n| | |\n|---|---|\n| **Current version** | `%s` |\n| **Next version** | `%s` |\n%s%b%b\n\n_Updated by [run #%s](%s)_' \
            "$HEADER" "$LATEST_TAG" "$NEXT_VERSION" "$BUMP_ROW" "$WARNING" "$CHANGELOG_SECTION" "$GITHUB_RUN_ID" "$RUN_URL")"

          # Find existing preview comment
          COMMENT_ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("<!-- release-preview -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            # Update existing comment
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
              -X PATCH --field body="$BODY"
          else
            # Create new comment
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --field body="$BODY"
          fi
