version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "no-bump"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "no-bump"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      all-actions:
        patterns:
          - "*"
